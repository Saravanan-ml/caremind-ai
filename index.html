<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CareMind AI</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="container">

<h1 class="title">
<i class="fa-solid fa-heart-pulse"></i> CareMind AI
</h1>

<p class="subtitle">
AI Based Disease Prediction & Healthcare Support System
</p>

<!-- Symptom input -->

<div class="card">

<h2><i class="fa-solid fa-stethoscope"></i> Enter Symptoms</h2>

<div class="input-area">

<input id="symptomInput" placeholder="Type symptom here">

<button onclick="addSymptom()">Add</button>

</div>

<h3>Selected Symptoms</h3>

<ul id="symptomList"></ul>

<button class="predict-btn" onclick="predict()">
<i class="fa-solid fa-magnifying-glass"></i>
Predict Disease
</button>

</div>

<!-- Result card -->

<div class="card result-card">

<h2><i class="fa-solid fa-hospital"></i> Prediction Result</h2>

<h3>Top Disease Prediction</h3>

<p class="disease-text">
<b id="disease">-</b>
<span id="confidence"></span>
</p>

<div class="confidence-bar">
<div id="confidenceFill"></div>
</div>

<h3>Differential Diagnosis</h3>

<ul id="possibleDiseases"></ul>

<div class="recommend-box">
<i class="fa-solid fa-user-doctor"></i>
<b>Recommendation:</b>
<span id="referral">-</span>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
