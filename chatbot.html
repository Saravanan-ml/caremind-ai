<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CareMind Medical Assistant</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

.chat-container{
width:600px;
margin:auto;
margin-top:40px;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.chat-box{
height:350px;
overflow-y:auto;
border:1px solid #ddd;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

.user{
text-align:right;
color:#2c3e50;
margin:10px 0;
}

.bot{
text-align:left;
color:#16a085;
margin:10px 0;
}

.chat-input{
display:flex;
gap:10px;
}

.chat-input input{
flex:1;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.voice-btn{
background:#e67e22;
color:white;
border:none;
padding:10px 12px;
border-radius:6px;
cursor:pointer;
}

.send-btn{
background:#27ae60;
color:white;
border:none;
padding:10px 15px;
border-radius:6px;
cursor:pointer;
}

.back-btn{
background:#3498db;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="chat-container">

<a href="index.html">
<button class="back-btn">
<i class="fa-solid fa-arrow-left"></i> Back to Disease Predictor
</button>
</a>

<h2>🩺 CareMind Medical Assistant</h2>

<div id="chatBox" class="chat-box"></div>

<div class="chat-input">

<input id="userInput" placeholder="Ask medical question...">

<button class="voice-btn" onclick="startVoiceChat()">
🎤
</button>

<button class="send-btn" onclick="sendMessage()">
Send
</button>

</div>

</div>

<script src="chatbot.js"></script>

</body>
</html>
